<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Net Worth · our tennis diary</title>
  <style>
    html, body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 560px at 50% -10%, rgba(46,89,73,0.10), transparent 60%),
        radial-gradient(900px 420px at 100% 15%, rgba(232,155,180,0.12), transparent 52%),
        linear-gradient(180deg, #FBF8F5 0%, #F6F0EC 100%);
      background-attachment: fixed;
    }
    * { box-sizing: border-box; }
  </style>
</head>
<body>

<div id="tennis-app"></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Gaegu:wght@400;700&display=swap');

  #tennis-app {
    --clay: #BD5D31; --clay-deep: #A14E27; --court: #1F4035; --court-light: #2E5949;
    --chalk: #F9F5F3; --chalk-dim: #F2ECEA; --ball: #CFE05B; --ink: #211D1A;
    --ink-soft: #6B6258; --line: rgba(33,29,26,0.08);
    --heart: #D96A8B; --tang: #17A398; --pink: #E89BB4; --card: #FFFDFB;
    --shadow-sm: 0 1px 3px rgba(33,29,26,0.06), 0 1px 2px rgba(33,29,26,0.04);
    --shadow-md: 0 4px 12px rgba(33,29,26,0.08), 0 2px 4px rgba(33,29,26,0.04);
    --shadow-lg: 0 10px 30px rgba(31,64,53,0.18);
    font-family: 'Inter', sans-serif; color: var(--ink); background: var(--card);
    border-radius: 20px; padding: 18px; max-width: 720px; width: 100%; margin: 0 auto; box-sizing: border-box;
    overflow: hidden;
  }
  #tennis-app * { box-sizing: border-box; }
  .tn-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 4px 2px; }
  .tn-title-wrap { display: flex; flex-direction: column; }
  .tn-title { font-family: 'Baloo 2', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: var(--court); margin: 0; line-height: 1; }
  .tn-title span { color: var(--clay); }
  .tn-subtitle { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--clay); letter-spacing: 2px; text-transform: lowercase; margin: 5px 0 0; }
  .tn-title-ball { width: 34px; height: 34px; flex-shrink: 0; }
  .tn-settings-btn { background: none; border: 1.5px solid var(--line); border-radius: 10px; width: 38px; height: 38px; font-size: 16px; cursor: pointer; color: var(--ink-soft); transition: all 0.15s ease; }
  .tn-settings-btn:hover { border-color: var(--clay); color: var(--clay); }
  .tn-settings-btn:active { transform: scale(0.92); }
  .tn-settings-btn.active { border-color: #fff; background: rgba(255,255,255,0.30); color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.25); }

  /* banner 背景板 */
  .tn-hero { position: relative; margin: -18px -18px 12px; height: 170px; border-radius: 20px 20px 0 0; overflow: hidden; }
  .tn-hero-bg { position: absolute; inset: 0; background: url('banner.jpg') center/cover no-repeat; }
  .tn-hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(33,29,26,0.40) 0%, rgba(33,29,26,0.10) 38%, rgba(33,29,26,0.26) 72%, rgba(33,29,26,0) 100%); }
  .tn-hero-content { position: relative; z-index: 2; padding: 18px; display: flex; align-items: flex-start; justify-content: space-between; }
  .tn-hero-content .tn-title-wrap { display: flex; flex-direction: column; }
  .tn-hero-content .tn-title { font-family: 'Baloo 2', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: #fff; margin: 0; line-height: 1; text-shadow: 0 2px 8px rgba(33,29,26,0.35); }
  .tn-hero-content .tn-subtitle { font-family: 'Inter', sans-serif; font-size: 12px; color: rgba(255,255,255,0.88); letter-spacing: 2px; text-transform: lowercase; margin: 6px 0 0; text-shadow: 0 1px 4px rgba(33,29,26,0.35); }
  .tn-hero-content .tn-settings-btn { border-color: rgba(255,255,255,0.55); color: #fff; background: rgba(255,255,255,0.12); }
  .tn-hero-content .tn-settings-btn:hover { border-color: #fff; background: rgba(255,255,255,0.22); }
  .tn-hero-divider { display: flex; align-items: center; gap: 9px; margin: 0 6px 16px; padding: 0 4px; }
  .tn-hero-divider::before, .tn-hero-divider::after { content: ''; flex: 1; height: 2px; border-radius: 2px; }
  .tn-hero-divider::before { background: linear-gradient(90deg, rgba(31,64,53,0), var(--court)); }
  .tn-hero-divider::after { background: linear-gradient(90deg, var(--ball), rgba(31,64,53,0)); }
  .tn-hero-divider .hd-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 1px 2px rgba(33,29,26,0.18); }
  .tn-hero-divider .hd-dot.c { background: var(--court); }
  .tn-hero-divider .hd-dot.b { background: var(--ball); }
  .tn-hero-divider .hd-dot.k { background: var(--clay); }

  .tn-tabs { display: flex; gap: 6px; background: var(--chalk-dim); border-radius: 14px; padding: 4px; margin-bottom: 18px; box-shadow: inset 0 1px 2px rgba(33,29,26,0.05); }
  .tn-tab { flex: 1; border: none; background: transparent; padding: 11px 4px; border-radius: 12px; font-family: 'Baloo 2', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; color: var(--ink-soft); cursor: pointer; transition: all 0.2s ease; }
  .tn-tab.active { background: var(--court); color: var(--chalk); box-shadow: var(--shadow-sm); }
  .tn-tab:active { transform: scale(0.97); }

  .tn-scoreboard { background: var(--court); border-radius: 18px; padding: 22px 24px; color: var(--chalk); margin-bottom: 16px; position: relative; overflow: hidden; box-shadow: var(--shadow-lg); }
  .tn-scoreboard::before { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 6px; background: repeating-linear-gradient(to bottom, var(--ball) 0 10px, transparent 10px 20px); opacity: 0.6; }
  .tn-score-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--ball); font-weight: 600; margin: 0 0 6px 0; }
  .tn-score-row { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; }
  .tn-score-main { font-family: 'JetBrains Mono', monospace; font-size: 44px; font-weight: 700; line-height: 1; letter-spacing: 1px; animation: tnGlow 3s ease-in-out infinite; }
  @keyframes tnGlow { 0%,100% { text-shadow: 0 0 0 rgba(207,224,91,0); } 50% { text-shadow: 0 0 14px rgba(207,224,91,0.35); } }
  .tn-score-sub { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: rgba(247,243,232,0.55); padding-bottom: 6px; }
  .tn-court-line { margin-top: 16px; height: 6px; border-radius: 4px; background: rgba(247,243,232,0.12); position: relative; overflow: hidden; }
  .tn-court-line-fill { position: absolute; top: 0; left: 0; bottom: 0; background: var(--clay); border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .tn-court-line-ball { position: absolute; top: 50%; width: 14px; height: 14px; background: var(--ball); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 0 3px var(--court), 0 0 10px rgba(207,224,91,0.6); transition: left 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .tn-score-foot { margin-top: 10px; font-size: 12px; color: rgba(247,243,232,0.6); display: flex; justify-content: space-between; }

  .tn-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .tn-stats-secondary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .tn-stat-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 12px 14px; position: relative; box-shadow: var(--shadow-sm); transition: transform 0.18s ease, box-shadow 0.18s ease; }
  .tn-stat-card:not(.secondary):hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .tn-stat-card.secondary { background: transparent; border: 1px dashed var(--line); box-shadow: none; }
  .tn-stat-num { font-family: 'Baloo 2', sans-serif; font-size: 22px; font-weight: 600; color: var(--ink); line-height: 1.1; }
  .tn-stat-num .unit { font-size: 12px; color: var(--ink-soft); font-family: 'Inter', sans-serif; font-weight: 500; margin-left: 2px; }
  .tn-stat-label { font-size: 11px; color: var(--ink-soft); margin-top: 4px; letter-spacing: 0.3px; display: flex; align-items: center; gap: 3px; }
  .tn-stat-card.tn-me .tn-stat-num { color: var(--tang); }
  .tn-stat-card.tn-friend .tn-stat-num { color: var(--clay); }
  .tn-stat-card.tn-together .tn-stat-num { color: var(--heart); }

  .tn-section-title { font-family: 'Baloo 2', sans-serif; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); margin: 22px 0 10px 0; padding-bottom: 8px; border-bottom: 1px dashed var(--line); display: flex; align-items: center; gap: 8px; }
  .tn-year-select, .tn-month-select { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--ink); background: #fff; border: 1.5px solid var(--line); border-radius: 6px; padding: 5px 8px; cursor: pointer; }
  .tn-chart-title { font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; letter-spacing: 0.3px; }

  .tn-stat-avatar { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid #fff; box-shadow: 0 1px 3px rgba(33,29,26,0.18); }
  .tn-history-icon { position: relative; width: 48px; height: 48px; border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: visible; }
  .tn-history-icon.me { background: var(--tang); }
  .tn-history-icon.friend { background: var(--clay); }
  .tn-history-icon.recharge { background: var(--ball); color: var(--ink); }
  .tn-history-icon img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; display: block; }
  .tn-history-icon .tn-history-av { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2.5px solid #fff; box-shadow: 0 1px 4px rgba(33,29,26,0.28); }
  .tn-history-icon.me .tn-history-av { border-color: var(--tang); }
  .tn-history-icon.friend .tn-history-av { border-color: var(--clay); }
  .tn-history-icon .tn-kind-badge { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(33,29,26,0.25); z-index: 5; }
  .tn-history-icon .tn-kind-badge svg { width: 11px; height: 11px; display: block; }
  .tn-history-icon.together { position: relative; background: linear-gradient(135deg, var(--court), var(--court-light)); overflow: visible; }
  .tn-history-icon.together .tn-pair-avatar { position: absolute; width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(33,29,26,0.3); }
  .tn-history-icon.together .tn-pair-avatar.a { top: -5px; left: -6px; z-index: 2; }
  .tn-history-icon.together .tn-pair-avatar.b { bottom: -5px; right: -6px; z-index: 1; }
  .tn-history-icon.together .tn-heart-badge { position: absolute; top: -9px; right: -9px; font-size: 14px; z-index: 4; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); animation: tnHeartBeat 1.6s ease-in-out infinite; }
  .tn-history-icon.together .tn-kind-badge { top: auto; bottom: -5px; left: -5px; right: auto; }
  @keyframes tnHeartBeat { 0%,100% { transform: scale(1); } 15% { transform: scale(1.25); } 30% { transform: scale(1); } }

  .tn-quickadd { background: linear-gradient(135deg, rgba(207,224,91,0.18), rgba(189,93,49,0.06)); border: 1.5px solid rgba(189,93,49,0.18); border-radius: 18px; padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
  .tn-quickadd .tn-section-title { margin-top: 0; border-bottom: 1px dashed rgba(189,93,49,0.25); }
  .tn-form-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; box-shadow: var(--shadow-sm); }
  .tn-toggle-row { display: flex; gap: 6px; margin-bottom: 12px; background: var(--chalk-dim); border-radius: 12px; padding: 4px; }
  .tn-toggle-btn { flex: 1; border: none; background: transparent; padding: 9px 4px; border-radius: 11px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--ink-soft); cursor: pointer; transition: all 0.18s ease; }
  .tn-toggle-btn.active { background: var(--court); color: var(--chalk); box-shadow: var(--shadow-sm); }
  .tn-toggle-btn.recharge-active { background: var(--clay); color: var(--chalk); box-shadow: var(--shadow-sm); }
  .tn-toggle-btn:active { transform: scale(0.97); }
  .tn-field-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .tn-field { flex: 1; min-width: 130px; }
  .tn-field label { display: block; font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; letter-spacing: 0.3px; }
  .tn-field input, .tn-field select { width: 100%; padding: 9px 10px; border: 1.5px solid var(--line); border-radius: 11px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--ink); background: var(--chalk); transition: border-color 0.15s ease, box-shadow 0.15s ease; }
  .tn-field input:focus, .tn-field select:focus { outline: none; border-color: var(--court); box-shadow: 0 0 0 3px rgba(31,64,53,0.1); }
  .tn-amount-preview { font-size: 13px; color: var(--ink-soft); margin-bottom: 10px; }
  .tn-amount-preview strong { font-family: 'JetBrains Mono', monospace; color: var(--court); font-size: 15px; }
  .tn-play-type-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .tn-play-type-btn { flex: 1; border: 1.5px solid var(--line); background: var(--chalk); padding: 10px 6px; border-radius: 11px; font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; text-align: center; transition: all 0.18s ease; }
  .tn-play-type-btn.selected { border-color: var(--court); background: var(--court); color: var(--chalk); box-shadow: var(--shadow-sm); }
  .tn-play-type-btn:active { transform: scale(0.97); }
  .tn-submit-btn { width: 100%; border: none; background: var(--court); color: var(--chalk); padding: 12px; border-radius: 12px; font-family: 'Baloo 2', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.18s ease; box-shadow: var(--shadow-sm); }
  .tn-submit-btn:hover { background: var(--court-light); box-shadow: var(--shadow-md); }
  .tn-submit-btn:active { transform: scale(0.98); }
  .tn-submit-btn.recharge { background: var(--clay); }
  .tn-submit-btn.recharge:hover { background: var(--clay-deep); }
  .tn-cancel-edit { width: 100%; border: 1.5px solid var(--line); background: var(--chalk); padding: 9px; border-radius: 12px; font-size: 13px; font-weight: 500; color: var(--ink-soft); cursor: pointer; margin-top: 8px; transition: all 0.15s ease; }
  .tn-cancel-edit:active { transform: scale(0.98); }

  .tn-chart-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
  .tn-linechart { width: 100%; height: auto; display: block; overflow: visible; }
  .tn-line-path { fill: none; stroke-width: 3; transition: opacity 0.25s ease, stroke-width 0.25s ease; }
  .tn-line-dot { transition: opacity 0.25s ease, r 0.25s ease; }
  .tn-line-dimmed { opacity: 0.15; }
  .tn-line-value { font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 600; }
  .tn-legend { display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .tn-legend-item { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(--line); background: var(--chalk); font-size: 12px; font-weight: 500; color: var(--ink); cursor: pointer; transition: all 0.18s ease; }
  .tn-legend-item:active { transform: scale(0.96); }
  .tn-legend-item.focused { border-color: var(--ink); box-shadow: var(--shadow-sm); }
  .tn-legend-item.faded { opacity: 0.4; }
  .tn-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .tn-donut-wrap { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; justify-content: center; }
  .tn-donut { flex-shrink: 0; }
  .tn-donut-center-num { font-family: 'Baloo 2', sans-serif; font-weight: 700; }
  .tn-donut-legend { display: flex; flex-direction: column; gap: 8px; }
  .tn-donut-leg-item { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink); }
  .tn-donut-leg-dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
  .tn-donut-leg-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; margin-left: auto; padding-left: 10px; }

  .tn-settle-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
  .tn-settle-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 13px; }
  .tn-settle-row + .tn-settle-row { border-top: 1px dashed var(--line); }
  .tn-settle-name { color: var(--ink-soft); }
  .tn-settle-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--ink); }
  .tn-settle-result { margin-top: 12px; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, rgba(207,224,91,0.25), rgba(31,64,53,0.06)); font-size: 14px; font-weight: 600; color: var(--court); text-align: center; }

  .tn-history { display: flex; flex-direction: column; gap: 8px; }
  .tn-history-item { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 11px 14px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .tn-history-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .tn-history-icon { width: 48px; height: 48px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; color: var(--chalk); }
  .tn-history-icon.me { background: var(--tang); }
  .tn-history-icon.friend { background: var(--clay); }
  .tn-history-icon.recharge { background: var(--ball); color: var(--ink); }
  .tn-history-icon svg { display: block; width: 22px; height: 22px; }
  .tn-history-body { flex: 1; min-width: 0; }
  .tn-history-title { font-size: 13.5px; font-weight: 500; color: var(--ink); }
  .tn-history-sub { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .tn-history-amount { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; }
  .tn-history-amount.recharge { color: #5C8A2E; }
  .tn-history-actions { display: flex; gap: 2px; }
  .tn-history-edit, .tn-history-del { border: none; background: none; color: var(--ink-soft); font-size: 15px; cursor: pointer; padding: 2px 5px; border-radius: 6px; line-height: 1; transition: all 0.15s ease; }
  .tn-history-edit:hover { color: var(--court); background: var(--chalk-dim); }
  .tn-history-del:hover { color: var(--clay); background: var(--chalk-dim); }
  .tn-history-edit:active, .tn-history-del:active { transform: scale(0.9); }
  .tn-history-item.editing { border-color: var(--court); box-shadow: 0 0 0 2px rgba(31,64,53,0.12); }

  /* 可爱空状态 */
  .tn-empty { position: relative; text-align: center; padding: 30px 10px 34px; min-height: 150px; }
  .tn-empty-scatter { position: absolute; inset: 0; pointer-events: none; }
  .tn-empty-word { position: absolute; font-family: 'Gaegu', cursive; color: rgba(107,98,88,0.35); font-size: 15px; font-weight: 700; }
  .tn-empty-center { position: relative; z-index: 2; display: inline-flex; flex-direction: column; align-items: center; gap: 8px; }
  .tn-empty-text { font-family: 'Gaegu', cursive; font-size: 16px; font-weight: 700; color: var(--ink-soft); }

  .tn-settings-panel { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-md); }
  .tn-settings-panel .tn-field-row:last-child { margin-bottom: 0; }
  .tn-settings-close { width: 100%; border: 1.5px solid var(--line); background: var(--chalk); padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--ink-soft); cursor: pointer; margin-top: 4px; }
  .tn-loading { text-align: center; padding: 40px 0; color: var(--ink-soft); font-size: 13px; }

  /* 标签内容淡入 */
  .tn-tab-content { animation: tnFade .26s ease; }
  @keyframes tnFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  /* 信息条 chips */
  .tn-streak-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 2px 0 14px; }
  .tn-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 6px 13px; font-size: 12.5px; color: var(--ink-soft); box-shadow: var(--shadow-sm); }
  .tn-chip b { font-family: 'JetBrains Mono', monospace; color: var(--court); font-size: 15px; }
  .tn-chip.tn-chip-fire b { color: var(--clay); }
  .tn-chip .tn-chip-ico { font-size: 14px; }

  /* 欢迎页 */

  async function dbDeleteTx(id) { const { error } = await sb.from('transactions').delete().eq('id', id); if (error) { console.error(error); alert('删除失败，请稍后再试'); } }
  async function dbSaveSettings() {
    const row = { id: 1, my_name: state.settings.myName, friend_name: state.settings.friendName, initial_balance: state.settings.initialBalance };
    const { error } = await sb.from('settings').upsert(row); if (error) { console.error(error); alert('设置保存失败'); }
  }

  function fmtMoney(n) { return '¥' + Number(n).toLocaleString('zh-CN', { maximumFractionDigits: 2 }); }
  function fmtFullDate(d) { const dt = new Date(d + 'T00:00:00'); return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0'); }
  function fmtHours(n) { return Number(n.toFixed(1)).toString(); }

  function computeSpendingStats() {
    const s = state.settings;
    let totalRecharge = s.initialBalance, totalSpent = 0, playCount = 0, lastPlayDate = null;
    for (const t of state.transactions) {
      if (t.kind === 'recharge') { totalRecharge += Number(t.amount); }
      else { totalSpent += Number(t.amount); playCount++; if (!lastPlayDate || t.date > lastPlayDate) lastPlayDate = t.date; }
    }
    const remaining = totalRecharge - totalSpent;
    const pct = totalRecharge > 0 ? Math.max(0, Math.min(100, (remaining/totalRecharge)*100)) : 0;
    let daysSinceLast = null;
    if (lastPlayDate) { const d1 = new Date(lastPlayDate + 'T00:00:00'); const d2 = new Date(); d2.setHours(0,0,0,0); daysSinceLast = Math.round((d2 - d1) / 86400000); }
    return { totalRecharge, totalSpent, remaining, pct, playCount, daysSinceLast };
  }

  function computeSettlement() {
    const s = state.settings;
    let myPaid = s.initialBalance / 2, friendPaid = s.initialBalance / 2, myUsed = 0, friendUsed = 0;
    for (const t of state.transactions) {
      if (t.kind === 'recharge') {
        const amt = Number(t.amount); const payer = t.payer || 'split';
        if (payer === 'me') myPaid += amt; else if (payer === 'friend') friendPaid += amt; else { myPaid += amt/2; friendPaid += amt/2; }
      } else {
        const amt = Number(t.amount);
        if (t.playType === 'together') { myUsed += amt/2; friendUsed += amt/2; }
        else if (t.playType === 'me') { myUsed += amt; } else if (t.playType === 'friend') { friendUsed += amt; }
      }
    }
    return { myPaid, friendPaid, myUsed, friendUsed, myNet: myPaid - myUsed, friendNet: friendPaid - friendUsed };
  }

  function inFilter(t) {
    if (state.playFilter === 'all') return true;
    if (state.playFilter === 'month') return t.date.slice(0,7) === state.filterMonth;
    if (state.playFilter === 'year') return new Date(t.date + 'T00:00:00').getFullYear() === state.summaryYear;
    return true;
  }

  function computeBreakdown() {
    let soloMe = 0, soloFriend = 0, together = 0;
    for (const t of state.transactions) {
      if (t.kind !== 'play') continue;
      if (!inFilter(t)) continue;
      const hours = Number(t.hours) || 0;
      if (t.playType === 'together') together += hours;
      else if (t.playType === 'me') soloMe += hours;
      else if (t.playType === 'friend') soloFriend += hours;
    }
    return { soloMe, soloFriend, together };
  }

  function computePlayStats() {
    let myHours = 0, friendHours = 0, togetherHours = 0, myCost = 0, friendCost = 0, totalCost = 0;
    for (const t of state.transactions) {
      if (t.kind !== 'play') continue;
      if (!inFilter(t)) continue;
      const hours = Number(t.hours) || 0, amount = Number(t.amount) || 0;
      totalCost += amount;
      if (t.playType === 'together') { togetherHours += hours; myHours += hours; friendHours += hours; myCost += amount/2; friendCost += amount/2; }
      else if (t.playType === 'me') { myHours += hours; myCost += amount; }
      else if (t.playType === 'friend') { friendHours += hours; friendCost += amount; }
    }
    return { myHours, friendHours, togetherHours, myCost, friendCost, totalCost };
  }

  function getAvailableYears() {
    const years = new Set(); years.add(new Date().getFullYear());
    for (const t of state.transactions) years.add(new Date(t.date + 'T00:00:00').getFullYear());
    return Array.from(years).sort((a, b) => b - a);
  }
  function getAvailableMonths() {
    const months = new Set(); months.add(new Date().toISOString().slice(0,7));
    for (const t of state.transactions) months.add(t.date.slice(0,7));
    return Array.from(months).sort((a, b) => b.localeCompare(a));
  }

  function computeMonthlySeries() {
    const months = []; const now = new Date();
    for (let i = 5; i >= 0; i--) { const d = new Date(now.getFullYear(), now.getMonth() - i, 1); months.push({ year: d.getFullYear(), month: d.getMonth(), me: 0, friend: 0, together: 0 }); }
    for (const t of state.transactions) {
      if (t.kind !== 'play') continue;
      const hours = Number(t.hours) || 0;
      const d = new Date(t.date + 'T00:00:00');
      const m = months.find(mm => mm.year === d.getFullYear() && mm.month === d.getMonth());
      if (!m) continue;
      if (t.playType === 'together') { m.together += hours; m.me += hours; m.friend += hours; }
      else if (t.playType === 'me') { m.me += hours; }
      else if (t.playType === 'friend') { m.friend += hours; }
    }
    return months;
  }

  function fmtDateKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

  function getDayAgg(dateStr) {
    const plays = state.transactions.filter(t => t.kind === 'play' && t.date === dateStr);
    const recharges = state.transactions.filter(t => t.kind === 'recharge' && t.date === dateStr);
    const players = new Set(); let together = false, hours = 0, cost = 0;
    const rateTypes = new Set();
    for (const t of plays) {
      if (t.playType === 'together') { players.add('me'); players.add('friend'); together = true; }
      else if (t.playType === 'me') players.add('me');
      else if (t.playType === 'friend') players.add('friend');
      hours += Number(t.hours) || 0; cost += Number(t.amount) || 0;
      if (t.rateType) rateTypes.add(t.rateType);
    }
    let dayStatus = 'unknown';
    if (plays.length > 0) {
      // 仅保留两种状态：含任何 peak 即判为「忙时」（优先），否则「闲时」
      if (rateTypes.has('peak')) dayStatus = 'busy';
      else if (rateTypes.has('off')) dayStatus = 'idle';
    }
    return { plays, recharges, players: [...players], together, hours, cost, rateTypes: [...rateTypes], dayStatus };
  }

  function cellMatchesFilter(agg) {
    const f = state.calFilter;
    if (!f || f === 'all') return true;
    if (f === 'me') return agg.players.includes('me');
    if (f === 'friend') return agg.players.includes('friend');
    if (f === 'together') return agg.together;
    return true;
  }

  function resetForm() {
    state.editingId = null; state.formMode = 'play'; state.playType = 'together'; state.rateType = 'off';
    state.hours = 1; state.payer = 'split'; state.formDate = new Date().toISOString().slice(0,10);
    state.formAmount = ''; state.formNote = '';
  }

  async function submitForm() {
    const wasEditing = !!state.editingId;
    let amount;
    if (state.formMode === 'play') { const hours = parseFloat(state.hours); if (!hours || hours <= 0) return; amount = Math.round(RATES[state.rateType] * hours * 100) / 100; }
    else { amount = parseFloat(state.formAmount); if (!amount || amount <= 0) return; }
    if (state.editingId) {
      const t = state.transactions.find(x => x.id === state.editingId);
      if (t) {
        t.kind = state.formMode; t.date = state.formDate; t.amount = amount; t.note = state.formNote.trim();
        if (state.formMode === 'play') { t.playType = state.playType; t.rateType = state.rateType; t.hours = parseFloat(state.hours); t.payer = undefined; }
        else { t.payer = state.payer; t.playType = undefined; t.rateType = undefined; t.hours = undefined; }
        render(); await dbUpdateTx(t);
      }
      resetForm(); if (wasEditing) state.activeTab = state.returnTab || 'record'; render();
    } else {
      const tx = { id: uid(), kind: state.formMode, date: state.formDate, amount: amount, note: state.formNote.trim() };
      if (state.formMode === 'play') { tx.playType = state.playType; tx.rateType = state.rateType; tx.hours = parseFloat(state.hours); }
      else { tx.payer = state.payer; }
      state.transactions.push(tx);
      resetForm(); render(); await dbInsertTx(tx);
    }
  }

  function startEdit(id) {
    const t = state.transactions.find(x => x.id === id); if (!t) return;
    state.returnTab = state.activeTab; state.activeTab = 'record'; state.editingId = id; state.formMode = t.kind; state.formDate = t.date; state.formNote = t.note || '';
    if (t.kind === 'play') { state.playType = t.playType || 'together'; state.rateType = t.rateType || 'off'; state.hours = t.hours || 1; }
    else { state.payer = t.payer || 'split'; state.formAmount = String(t.amount); }
    render();
    root.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escapeHtml(str) { return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function animateBalance() {
    const el = root.querySelector('[data-count-to]');
    if (!el) return;
    const target = parseFloat(el.getAttribute('data-count-to')) || 0;
    const prefix = el.getAttribute('data-prefix') || '';
    const duration = 600; const start = performance.now();
    function frame(now) {
      let p = Math.min(1, (now - start) / duration); p = 1 - Math.pow(1 - p, 3);
      el.textContent = prefix + Math.round(target * p).toLocaleString('zh-CN');
      if (p < 1) requestAnimationFrame(frame);
      else el.textContent = prefix + Math.round(target).toLocaleString('zh-CN');
    }
    requestAnimationFrame(frame);
  }

    return '<img class="' + cls + '" src="' + path + '" alt="" onerror="__tnAvFallback(this,\'' + escapeHtml(init) + '\',\'' + bg + '\')" />';
  }
  window.__tnAvFallback = function(img, init, bg) {
    const span = document.createElement('span');
    span.className = img.className;
    span.style.cssText = img.style.cssText + ';background:' + bg + ';color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;';
    span.textContent = init;
    if (img.parentNode) img.parentNode.replaceChild(span, img);
  };

      + avFallbackImg(AVATAR_TANG, myInit, '#17A398', 'tn-welcome-av')
      + avFallbackImg(AVATAR_KE, frInit, '#BD5D31', 'tn-welcome-av')
      + '</div>'
      + '<div class="tn-welcome-meta">' + escapeHtml(s.myName) + ' × ' + escapeHtml(s.friendName) + '</div>'
      + '<button class="tn-welcome-btn" id="tn-welcome-start">开始记录 🎾</button>'
      + '</div></div>';
  }

  function renderCalendar(s) {
    const y = state.calYear, m = state.calMonth;
    const monthName = y + '年' + (m+1) + '月';
    const first = new Date(y, m, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const todayKey = fmtDateKey(new Date());
    const monthKey = y + '-' + String(m+1).padStart(2,'0');

    let html = '';
    html += '<div class="tn-cal-head">'
      + '<div class="tn-cal-nav"><button class="tn-cal-nav-btn" id="tn-cal-prev">‹</button>'
      + '<h2 class="tn-cal-title">' + monthName + '</h2>'
      + '<button class="tn-cal-nav-btn" id="tn-cal-next">›</button></div>'
      + '<div class="tn-cal-slicer">'
        + '<button class="tn-slice' + (state.calFilter === 'all' ? ' active' : '') + '" data-calfilter="all">全部</button>'
        + '<button class="tn-slice' + (state.calFilter === 'me' ? ' active' : '') + '" data-calfilter="me">' + avFallbackImg(AVATAR_TANG, s.myName.slice(0,1), '#17A398', 'tn-slice-av') + escapeHtml(s.myName) + '</button>'
        + '<button class="tn-slice' + (state.calFilter === 'friend' ? ' active' : '') + '" data-calfilter="friend">' + avFallbackImg(AVATAR_KE, s.friendName.slice(0,1), '#BD5D31', 'tn-slice-av') + escapeHtml(s.friendName) + '</button>'
        + '<button class="tn-slice' + (state.calFilter === 'together' ? ' active' : '') + '" data-calfilter="together"><span class="tn-slice-emoji">💗</span>一起</button>'
      + '</div>'
      + '<div class="tn-cal-legend-row">'
        + '<span class="tn-cal-leg"><span class="tn-cal-leg-dot me"></span>闲时</span>'
        + '<span class="tn-cal-leg"><span class="tn-cal-leg-dot friend"></span>忙时</span>'
        + '<span class="tn-cal-leg"><span class="tn-cal-leg-kind">' + racketIcon(14) + '</span>打球</span>'
        + '<span class="tn-cal-leg"><span class="tn-cal-leg-kind">' + coinIcon(14) + '</span>充值</span>'
      + '</div></div>';

    const monthPlays = state.transactions.filter(t => t.kind === 'play' && t.date.slice(0,7) === monthKey).length;
    html += '<div class="tn-streak-bar">'
      + '<span class="tn-chip"><span class="tn-chip-ico">🎾</span>本月已打 <b>' + monthPlays + '</b> 次</span></div>';

    const dows = ['日','一','二','三','四','五','六'];
    html += '<div class="tn-cal-grid">';
    dows.forEach((d, i) => { html += '<div class="tn-cal-dow' + ((i===0||i===6) ? ' tn-cal-weekend' : '') + '">' + d + '</div>'; });
    for (let i=0; i<startDow; i++) html += '<div class="tn-cal-cell tn-cal-pad"><span class="tn-cal-daynum">·</span></div>';
    for (let d=1; d<=daysInMonth; d++) {
      const key = y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const agg = getDayAgg(key);
      const hasPlay = agg.plays.length > 0;
      const hasRecharge = agg.recharges.length > 0;
      const has = hasPlay || hasRecharge;
      const isToday = key === todayKey;
      const dim = (state.calFilter && state.calFilter !== 'all') && !cellMatchesFilter(agg);
      const match = (state.calFilter && state.calFilter !== 'all') && cellMatchesFilter(agg);
      let cls = 'tn-cal-cell' + (has ? ' tn-cal-has' : '') + (isToday ? ' tn-cal-today' : '') + (hasPlay ? ' tn-cal-' + agg.dayStatus : '') + (dim ? ' tn-cal-dim' : '') + (match ? ' tn-cal-match' : '');
      let style = '';
      if (hasPlay) {
        const intensity = Math.min(0.36, 0.09 + agg.hours * 0.09);
        const base = { idle: '23,163,152', busy: '189,93,49', unknown: '107,98,88' }[agg.dayStatus];
        style = ' style="background:rgba(' + base + ',' + intensity.toFixed(2) + ');"';
      } else if (hasRecharge) {
        style = ' style="background:rgba(207,224,91,0.18);"';
      }
      let marks = '';
      if (has) {
        let playerMarks = '';
        if (agg.players.includes('me')) playerMarks += avFallbackImg(AVATAR_TANG, s.myName.slice(0,1), '#17A398', 'tn-cal-avatar');
        if (agg.players.includes('friend')) playerMarks += avFallbackImg(AVATAR_KE, s.friendName.slice(0,1), '#BD5D31', 'tn-cal-avatar');
        let kindMarks = '';
        if (hasPlay) kindMarks += '<span class="tn-cal-kind-icon">' + racketIcon(15, true) + '</span>';
        if (hasRecharge) kindMarks += '<span class="tn-cal-kind-icon tn-cal-kind-recharge">' + coinIcon(15) + '</span>';
        marks = (agg.together ? '<span class="tn-cal-heart">💗</span>' : '')
          + kindMarks
          + '<div class="tn-cal-marks">' + playerMarks + '</div>';
      }
      html += '<div class="' + cls + '"' + style + ' data-caldate="' + key + '">'
        + '<span class="tn-cal-daynum">' + d + '</span>' + marks + '</div>';
    }
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--ink-soft);margin-top:12px;line-height:1.5;">点击任意日期，查看当天打球明细（可编辑 / 删除 / 补记）。</div>';

    if (state.calSelected) html += renderDayModal(s, state.calSelected);
    return html;
  }

  function renderDayModal(s, dateKey) {
    const agg = getDayAgg(dateKey);
    const all = [...agg.plays, ...agg.recharges].sort((a, b) => b.id.localeCompare(a.id));
    let body;
    if (all.length === 0) body = '<div class="tn-modal-empty">这一天还没有记录～</div>';
    else { body = '<div class="tn-history">'; for (const t of all) body += historyItemHtml(t, s, state.editingId === t.id); body += '</div>'; }
    const dt = new Date(dateKey + 'T00:00:00');
    const title = dt.getFullYear() + '年' + (dt.getMonth()+1) + '月' + dt.getDate() + '日';
    return '<div class="tn-modal-overlay" id="tn-cal-modal">'
      + '<div class="tn-modal">'
        + '<div class="tn-modal-head"><div class="tn-modal-title">' + title + '</div>'
        + '<button class="tn-modal-close" id="tn-modal-close">×</button></div>'
        + '<div class="tn-modal-body">' + body + '</div>'
        + '<div class="tn-modal-foot"><button class="tn-modal-add" id="tn-modal-add">＋ 记一笔（这天）</button></div>'
      + '</div></div>';
  }

  function buildLineChart(s) {
    const months = computeMonthlySeries();
    const W = 320, H = 150, padL = 8, padR = 8, padT = 16, padB = 22;
    const n = months.length;
    const maxV = Math.max(1, ...months.map(m => Math.max(m.me, m.friend, m.together)));
    const xAt = (i) => padL + (W - padL - padR) * (n === 1 ? 0.5 : i / (n - 1));
    const yAt = (v) => padT + (H - padT - padB) * (1 - v / maxV);

    const series = [
      { key: 'me', color: 'var(--tang)', vals: months.map(m => m.me) },
      { key: 'friend', color: 'var(--clay)', vals: months.map(m => m.friend) },
      { key: 'together', color: 'var(--heart)', vals: months.map(m => m.together) }
    ];

    function heartPath(cx, cy, size) {
      const s2 = size;
      return 'M ' + cx + ' ' + (cy + s2*0.3)
        + ' C ' + (cx - s2) + ' ' + (cy - s2*0.6) + ', ' + (cx - s2*0.5) + ' ' + (cy - s2*1.1) + ', ' + cx + ' ' + (cy - s2*0.4)
        + ' C ' + (cx + s2*0.5) + ' ' + (cy - s2*1.1) + ', ' + (cx + s2) + ' ' + (cy - s2*0.6) + ', ' + cx + ' ' + (cy + s2*0.3) + ' Z';
    }

    let svg = '<svg class="tn-linechart" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';
    for (let g = 0; g <= 2; g++) { const gy = padT + (H - padT - padB) * (g / 2); svg += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy + '" stroke="rgba(33,29,26,0.06)" stroke-width="1" />'; }
    months.forEach((m, i) => { svg += '<text x="' + xAt(i) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="9" fill="var(--ink-soft)" font-family="JetBrains Mono, monospace">' + (m.month + 1) + '月</text>'; });

    series.forEach(se => {
      const focused = state.focusLine === se.key;
      const dimmed = state.focusLine && !focused;
      const cls = 'tn-line-path' + (dimmed ? ' tn-line-dimmed' : '');
      const sw = focused ? 4 : 3;
      let d = '';
      se.vals.forEach((v, i) => { d += (i === 0 ? 'M ' : ' L ') + xAt(i) + ' ' + yAt(v); });
      svg += '<path class="' + cls + '" d="' + d + '" stroke="' + se.color + '" style="stroke-width:' + sw + '" />';
      se.vals.forEach((v, i) => {
        const showDot = !state.focusLine || focused;
        const dotCls = 'tn-line-dot' + (dimmed ? ' tn-line-dimmed' : '');
        if (se.key === 'together') {
          svg += '<path class="' + dotCls + '" d="' + heartPath(xAt(i), yAt(v), 4) + '" fill="' + se.color + '" style="opacity:' + (showDot ? 1 : 0.15) + '" />';
        } else {
          svg += '<circle class="' + dotCls + '" cx="' + xAt(i) + '" cy="' + yAt(v) + '" r="' + (showDot ? 3.2 : 0) + '" fill="' + se.color + '" />';
        }
        if (focused) {
          const ty = yAt(v) - 8;
          svg += '<text class="tn-line-value" x="' + xAt(i) + '" y="' + ty + '" text-anchor="middle" fill="' + se.color + '">' + fmtHours(v) + '</text>';
        }
      });
    });
    svg += '</svg>';

    const legItem = (key, color, label, heart) => {
      const focused = state.focusLine === key ? ' focused' : '';
      const faded = (state.focusLine && state.focusLine !== key) ? ' faded' : '';
      const dot = heart ? '<span style="color:' + color + ';font-size:12px;line-height:1;">♥</span>' : '<span class="tn-legend-dot" style="background:' + color + '"></span>';
      return '<div class="tn-legend-item' + focused + faded + '" data-focus="' + key + '">' + dot + label + '</div>';
    };
    let legend = '<div class="tn-legend">'
      + legItem('me', 'var(--tang)', escapeHtml(s.myName), false)
      + legItem('friend', 'var(--clay)', escapeHtml(s.friendName), false)
      + legItem('together', 'var(--heart)', '一起打', true)
      + '</div>';

    return svg + legend;
  }

  function buildDonut(s) {
    const bd = computeBreakdown();
    const total = bd.soloMe + bd.soloFriend + bd.together;
    const segs = [
      { label: escapeHtml(s.myName) + '自己', val: bd.soloMe, color: '#17A398' },
      { label: escapeHtml(s.friendName) + '自己', val: bd.soloFriend, color: '#BD5D31' },
      { label: '一起打', val: bd.together, color: '#D96A8B' }
    ];
    const R = 52, cx = 62, cy = 62, sw = 20, C = 2 * Math.PI * R;
    let svg = '<svg class="tn-donut" width="124" height="124" viewBox="0 0 124 124">';
    svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + R + '" fill="none" stroke="var(--chalk-dim)" stroke-width="' + sw + '" />';
    if (total > 0) {
      let offset = 0;
      segs.forEach(seg => {
        if (seg.val <= 0) return;
        const frac = seg.val / total; const len = frac * C;
        svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + R + '" fill="none" stroke="' + seg.color + '" stroke-width="' + sw + '"'
          + ' stroke-dasharray="' + len + ' ' + (C - len) + '" stroke-dashoffset="' + (-offset) + '"'
          + ' transform="rotate(-90 ' + cx + ' ' + cy + ')" stroke-linecap="butt" />';
        offset += len;
      });
    }
    svg += '<text class="tn-donut-center-num" x="' + cx + '" y="' + (cy - 2) + '" text-anchor="middle" font-size="20" fill="var(--ink)">' + fmtHours(total) + '</text>';
    svg += '<text x="' + cx + '" y="' + (cy + 15) + '" text-anchor="middle" font-size="9" fill="var(--ink-soft)">总小时</text>';
    svg += '</svg>';

    let legend = '<div class="tn-donut-legend">';
    segs.forEach(seg => {
      const pct = total > 0 ? Math.round(seg.val / total * 100) : 0;
      legend += '<div class="tn-donut-leg-item"><span class="tn-donut-leg-dot" style="background:' + seg.color + '"></span>' + seg.label
        + '<span class="tn-donut-leg-val">' + fmtHours(seg.val) + 'h · ' + pct + '%</span></div>';
    });
    legend += '</div>';

    return '<div class="tn-donut-wrap">' + svg + legend + '</div>';
  }

  function renderDashboard(s) {
    const playStats = computePlayStats();
    const settle = computeSettlement();
    const years = getAvailableYears();
    const availMonths = getAvailableMonths();
    let html = '';

    html += '<div class="tn-section-title">打球时长</div>';
    html += '<div class="tn-toggle-row" style="margin-bottom:10px;">'
      + '<button class="tn-toggle-btn ' + (state.playFilter === 'month' ? 'active' : '') + '" data-playfilter="month">月份</button>'
      + '<button class="tn-toggle-btn ' + (state.playFilter === 'year' ? 'active' : '') + '" data-playfilter="year">本年</button>'
      + '<button class="tn-toggle-btn ' + (state.playFilter === 'all' ? 'active' : '') + '" data-playfilter="all">全部</button></div>';
    if (state.playFilter === 'month') {
      html += '<div style="margin-bottom:12px; display:flex; justify-content:flex-end;"><select id="tn-month-select" class="tn-month-select">'
        + availMonths.map(m => { const [y, mo] = m.split('-'); return '<option value="' + m + '" ' + (m === state.filterMonth ? 'selected' : '') + '>' + y + '年' + parseInt(mo,10) + '月</option>'; }).join('') + '</select></div>';
    } else if (state.playFilter === 'year') {
      html += '<div style="margin-bottom:12px; display:flex; justify-content:flex-end;"><select id="tn-year-select" class="tn-year-select">'
        + years.map(y => '<option value="' + y + '" ' + (y === state.summaryYear ? 'selected' : '') + '>' + y + '年</option>').join('') + '</select></div>';
    }

    html += '<div class="tn-stats">';
    html += statCard(fmtHours(playStats.myHours), '小时', escapeHtml(s.myName) + '时长', 'tn-me', AVATAR_TANG, s.myName.slice(0,1));
    html += statCard(fmtHours(playStats.friendHours), '小时', escapeHtml(s.friendName) + '时长', 'tn-friend', AVATAR_KE, s.friendName.slice(0,1));
    html += statCard(fmtHours(playStats.togetherHours), '小时', '一起打 ♥', 'tn-together');
    html += '</div>';

    html += '<div class="tn-stats-secondary">';
    html += statCard(fmtMoney(playStats.myCost), '', escapeHtml(s.myName) + '花费', 'secondary');
    html += statCard(fmtMoney(playStats.friendCost), '', escapeHtml(s.friendName) + '花费', 'secondary');
    html += statCard(fmtMoney(playStats.totalCost), '', '总花费', 'secondary');
    html += '</div>';

    // 图表：月份=趋势折线；本年/全部=占比环形，各留一张
    if (state.playFilter === 'month') {
      html += '<div class="tn-chart-card"><div class="tn-chart-title">近6个月打球时长趋势（小时）· 详细数字请点击名字查看</div>';
      html += buildLineChart(s);
      html += '</div>';
    } else {
      html += '<div class="tn-chart-card"><div class="tn-chart-title">时长构成占比（' + (state.playFilter === 'year' ? state.summaryYear + '年' : '全部') + '）</div>';
      html += buildDonut(s);
      html += '</div>';
    }

    html += '<div class="tn-section-title">分账结算</div>';
    html += '<div class="tn-settle-card">'
      + '<div class="tn-settle-row"><span class="tn-settle-name">' + escapeHtml(s.myName) + ' 投入 / 消耗</span><span class="tn-settle-val">' + fmtMoney(settle.myPaid) + ' / ' + fmtMoney(settle.myUsed) + '</span></div>'
      + '<div class="tn-settle-row"><span class="tn-settle-name">' + escapeHtml(s.friendName) + ' 投入 / 消耗</span><span class="tn-settle-val">' + fmtMoney(settle.friendPaid) + ' / ' + fmtMoney(settle.friendUsed) + '</span></div>';
    const diff = Math.round((settle.myNet - settle.friendNet) / 2 * 100) / 100;
    let resultText;
    if (Math.abs(diff) < 0.01) resultText = '两人已平账，谁也不欠谁 🎉';
    else if (diff > 0) resultText = escapeHtml(s.friendName) + ' 应补给 ' + escapeHtml(s.myName) + ' ' + fmtMoney(diff);
    else resultText = escapeHtml(s.myName) + ' 应补给 ' + escapeHtml(s.friendName) + ' ' + fmtMoney(Math.abs(diff));
    html += '<div class="tn-settle-result">' + resultText + '</div>';
    html += '<div style="font-size:11px;color:var(--ink-soft);margin-top:10px;line-height:1.5;">投入=各自充值（含初始金额各半）；消耗=自己打的全算自己、一起打的各算一半。差额取一半即为应补金额。</div>';
    html += '</div>';

    return html;
  }

  function statCard(num, unit, label, extraClass, avatar, avatarInitial) {
    let avatarHtml = '';
    if (avatar) {
      const bg = extraClass === 'tn-me' ? '#17A398' : (extraClass === 'tn-friend' ? '#BD5D31' : '#6B6258');
      avatarHtml = avFallbackImg(avatar, avatarInitial || label.slice(0,1), bg, 'tn-stat-avatar');
    }
    return '<div class="tn-stat-card ' + (extraClass || '') + '">' + avatarHtml
      + '<div class="tn-stat-num">' + num + (unit ? '<span class="unit">' + unit + '</span>' : '') + '</div>'
      + '<div class="tn-stat-label">' + label + '</div></div>';
  }

  function attachHandlers() {
    const settingsBtn = document.getElementById('tn-settings-btn');
    if (settingsBtn) settingsBtn.onclick = openSettings;
    const setSave = document.getElementById('tn-settings-save');
    if (setSave) setSave.onclick = () => {
      state.settingsDraft.myName = document.getElementById('tn-set-myname').value;
      state.settingsDraft.friendName = document.getElementById('tn-set-friendname').value;
      state.settingsDraft.initialBalance = document.getElementById('tn-set-initbalance').value;
      saveSettingsDraft();
    };
    const setCancel = document.getElementById('tn-settings-cancel');
    if (setCancel) setCancel.onclick = () => { state.showSettings = false; render(); };

    document.querySelectorAll('[data-tab]').forEach(btn => { btn.onclick = () => { syncFormInputs(); state.activeTab = btn.getAttribute('data-tab'); render(); }; });
    document.querySelectorAll('[data-playfilter]').forEach(btn => { btn.onclick = () => { state.playFilter = btn.getAttribute('data-playfilter'); render(); }; });
    const monthSelect = document.getElementById('tn-month-select');
    if (monthSelect) monthSelect.onchange = (e) => { state.filterMonth = e.target.value; render(); };
    const yearSelect = document.getElementById('tn-year-select');
    if (yearSelect) yearSelect.onchange = (e) => { state.summaryYear = parseInt(e.target.value, 10); render(); };

    document.querySelectorAll('[data-focus]').forEach(el => { el.onclick = () => { const k = el.getAttribute('data-focus'); state.focusLine = (state.focusLine === k) ? null : k; render(); }; });

    const modePlay = document.getElementById('tn-mode-play');
    if (modePlay) modePlay.onclick = () => { syncFormInputs(); state.formMode = 'play'; render(); };
    const modeRecharge = document.getElementById('tn-mode-recharge');
    if (modeRecharge) modeRecharge.onclick = () => { syncFormInputs(); state.formMode = 'recharge'; render(); };

    document.querySelectorAll('[data-playtype]').forEach(btn => { btn.onclick = () => { syncFormInputs(); state.playType = btn.getAttribute('data-playtype'); render(); }; });
    document.querySelectorAll('[data-ratetype]').forEach(btn => { btn.onclick = () => { syncFormInputs(); state.rateType = btn.getAttribute('data-ratetype'); render(); }; });
    document.querySelectorAll('[data-payer]').forEach(btn => { btn.onclick = () => { syncFormInputs(); state.payer = btn.getAttribute('data-payer'); render(); }; });

    const submitBtn = document.getElementById('tn-submit');
    if (submitBtn) submitBtn.onclick = () => { syncFormInputs(); submitForm(); };
    const cancelEdit = document.getElementById('tn-cancel-edit');
    if (cancelEdit) cancelEdit.onclick = () => { resetForm(); state.activeTab = state.returnTab || 'record'; render(); };

    // 日历：月份切换
    const calPrev = document.getElementById('tn-cal-prev');
    if (calPrev) calPrev.onclick = () => { state.calMonth--; if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; } render(); };
    const calNext = document.getElementById('tn-cal-next');
    if (calNext) calNext.onclick = () => { state.calMonth++; if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; } render(); };
    document.querySelectorAll('[data-calfilter]').forEach(btn => { btn.onclick = () => { state.calFilter = btn.getAttribute('data-calfilter'); render(); }; });

    // 日历：点击日期 -> 弹窗
    document.querySelectorAll('[data-caldate]').forEach(cell => {
      cell.onclick = () => { state.calSelected = cell.getAttribute('data-caldate'); render(); };
    });

    // 弹窗：关闭 / 点击遮罩 / 补记
    const modalOverlay = document.getElementById('tn-cal-modal');
    if (modalOverlay) {
      modalOverlay.onclick = (e) => { if (e.target === modalOverlay) { closeCalModal(); render(); } };
      const modalClose = document.getElementById('tn-modal-close');
      if (modalClose) modalClose.onclick = () => { closeCalModal(); render(); };
      const modalAdd = document.getElementById('tn-modal-add');
      if (modalAdd) modalAdd.onclick = () => { const d = state.calSelected; closeCalModal(); state.returnTab = 'calendar'; state.activeTab = 'record'; state.editingId = null; state.formMode = 'play'; if (d) state.formDate = d; render(); };
    }

    document.querySelectorAll('[data-edit]').forEach(btn => { btn.onclick = () => { closeCalModal(); startEdit(btn.getAttribute('data-edit')); }; });
    document.querySelectorAll('[data-del]').forEach(btn => { btn.onclick = () => { closeCalModal(); deleteTransaction(btn.getAttribute('data-del')); }; });

    const dateInput = document.getElementById('tn-form-date');
    if (dateInput) dateInput.oninput = (e) => { state.formDate = e.target.value; };
    const amountInput = document.getElementById('tn-form-amount');
    if (amountInput) amountInput.oninput = (e) => { state.formAmount = e.target.value; };
    const hoursInput = document.getElementById('tn-form-hours');
    if (hoursInput) hoursInput.oninput = (e) => {
      state.hours = e.target.value;
      const preview = document.querySelector('.tn-amount-preview strong');
      if (preview) { const amt = Math.round(RATES[state.rateType] * (parseFloat(state.hours) || 0) * 100) / 100; preview.textContent = fmtMoney(amt); }
    };
    const noteInput = document.getElementById('tn-form-note');
    if (noteInput) noteInput.oninput = (e) => { state.formNote = e.target.value; };
  }

  function syncFormInputs() {
    const dateInput = document.getElementById('tn-form-date');
    const amountInput = document.getElementById('tn-form-amount');
    const hoursInput = document.getElementById('tn-form-hours');
    const noteInput = document.getElementById('tn-form-note');
    if (dateInput) state.formDate = dateInput.value;
    if (amountInput) state.formAmount = amountInput.value;
    if (hoursInput) state.hours = hoursInput.value;
    if (noteInput) state.formNote = noteInput.value;
  }

  load();
})();
</script>

</body>
</html>
