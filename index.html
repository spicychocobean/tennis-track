<div id="tennis-app"></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  #tennis-app {
    --clay: #BD5D31;
    --clay-deep: #A14E27;
    --court: #1F4035;
    --court-light: #2E5949;
    --chalk: #F7F3E8;
    --chalk-dim: #EDE7D8;
    --ball: #CFE05B;
    --ink: #211D1A;
    --ink-soft: #6B6258;
    --line: rgba(33,29,26,0.10);

    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: var(--chalk);
    border-radius: 18px;
    padding: 22px;
    max-width: 720px;
    margin: 0 auto;
    box-sizing: border-box;
  }
  #tennis-app * { box-sizing: border-box; }

  /* ---------- Header ---------- */
  .tn-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .tn-title {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--court);
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tn-title-ball {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
  }
  .tn-title span { color: var(--clay); }
  .tn-settings-btn {
    background: none;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s ease;
  }
  .tn-settings-btn:hover { border-color: var(--clay); color: var(--clay); }

  /* ---------- Scoreboard ---------- */
  .tn-scoreboard {
    background: var(--court);
    border-radius: 14px;
    padding: 22px 24px;
    color: var(--chalk);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .tn-scoreboard::before {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 6px;
    background: repeating-linear-gradient(
      to bottom, var(--ball) 0 10px, transparent 10px 20px
    );
    opacity: 0.6;
  }
  .tn-score-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ball);
    font-weight: 600;
    margin: 0 0 6px 0;
  }
  .tn-score-row {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    flex-wrap: wrap;
  }
  .tn-score-main {
    font-family: 'JetBrains Mono', monospace;
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 1px;
  }
  .tn-score-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: rgba(247,243,232,0.55);
    padding-bottom: 6px;
  }
  .tn-court-line {
    margin-top: 16px;
    height: 6px;
    border-radius: 4px;
    background: rgba(247,243,232,0.12);
    position: relative;
    overflow: hidden;
  }
  .tn-court-line-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: var(--clay);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .tn-court-line-ball {
    position: absolute;
    top: 50%;
    width: 14px; height: 14px;
    background: var(--ball);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 3px var(--court);
    transition: left 0.4s ease;
  }
  .tn-score-foot {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(247,243,232,0.6);
    display: flex;
    justify-content: space-between;
  }

  /* ---------- Stats grid ---------- */
  .tn-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  @media (max-width: 520px) {
    .tn-stats { grid-template-columns: repeat(2, 1fr); }
  }
  .tn-stat-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .tn-stat-num {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
  }
  .tn-stat-num .unit { font-size: 13px; color: var(--ink-soft); font-family: 'Inter', sans-serif; font-weight: 500; margin-left: 2px;}
  .tn-stat-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .tn-stat-card.tn-me .tn-stat-num { color: var(--court); }
  .tn-stat-card.tn-friend .tn-stat-num { color: var(--clay); }

  /* ---------- Section titles ---------- */
  .tn-section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
    margin: 22px 0 10px 0;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tn-section-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tn-year-select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: normal;
    text-transform: none;
    color: var(--ink);
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 6px;
    padding: 5px 8px;
    cursor: pointer;
  }
  .tn-chart-title {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }
  .tn-chart-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .tn-chart-title-row .tn-chart-title { margin-bottom: 0; }

  /* ---------- Avatars ---------- */
  .tn-stat-card { position: relative; }
  .tn-stat-avatar {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid #fff;
    box-shadow: 0 1px 3px rgba(33,29,26,0.18);
  }
  .tn-history-icon img {
    width: 100%;
    height: 100%;
    border-radius: 8px;
    object-fit: cover;
    display: block;
  }
  .tn-history-icon.together {
    position: relative;
    background: var(--court);
  }
  .tn-history-icon.together .tn-pair-avatar {
    position: absolute;
    width: 22px; height: 22px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid var(--court);
  }
  .tn-history-icon.together .tn-pair-avatar.a { top: -2px; left: -2px; z-index: 2; }
  .tn-history-icon.together .tn-pair-avatar.b { bottom: -2px; right: -2px; }

  /* ---------- Quick add (记一笔) ---------- */
  .tn-quickadd {
    background: linear-gradient(135deg, rgba(207,224,91,0.20), rgba(189,93,49,0.06));
    border: 1.5px solid rgba(189,93,49,0.22);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .tn-quickadd .tn-section-title {
    margin-top: 0;
    border-bottom: 1px dashed rgba(189,93,49,0.25);
  }

  /* ---------- Form card ---------- */
  .tn-form-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }
  .tn-toggle-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    background: var(--chalk-dim);
    border-radius: 10px;
    padding: 4px;
  }
  .tn-toggle-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 9px 4px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .tn-toggle-btn.active {
    background: var(--court);
    color: var(--chalk);
  }
  .tn-toggle-btn.recharge-active {
    background: var(--clay);
    color: var(--chalk);
  }

  .tn-field-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .tn-field {
    flex: 1;
    min-width: 130px;
  }
  .tn-field label {
    display: block;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .tn-field input, .tn-field select {
    width: 100%;
    padding: 9px 10px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--chalk);
  }
  .tn-field input:focus, .tn-field select:focus {
    outline: none;
    border-color: var(--court);
  }

  .tn-amount-preview {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .tn-amount-preview strong {
    font-family: 'JetBrains Mono', monospace;
    color: var(--court);
    font-size: 15px;
  }

  .tn-play-type-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tn-play-type-btn {
    flex: 1;
    border: 1.5px solid var(--line);
    background: var(--chalk);
    padding: 10px 6px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s ease;
  }
  .tn-play-type-btn.selected {
    border-color: var(--court);
    background: var(--court);
    color: var(--chalk);
  }

  .tn-submit-btn {
    width: 100%;
    border: none;
    background: var(--court);
    color: var(--chalk);
    padding: 12px;
    border-radius: 8px;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .tn-submit-btn:hover { background: var(--court-light); }
  .tn-submit-btn.recharge { background: var(--clay); }
  .tn-submit-btn.recharge:hover { background: var(--clay-deep); }

  /* ---------- Chart ---------- */
  .tn-chart-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }
  .tn-chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 90px;
  }
  .tn-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
  }
  .tn-bar {
    width: 100%;
    border-radius: 4px 4px 2px 2px;
    background: var(--chalk-dim);
    min-height: 4px;
    transition: height 0.3s ease;
  }
  .tn-bar.has-games { background: var(--court); }
  .tn-bar.this-week { background: var(--clay); }
  .tn-bar-label {
    font-size: 10px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .tn-bar-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 3px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---------- History list ---------- */
  .tn-history {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tn-history-item {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tn-history-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    color: var(--chalk);
  }
  .tn-history-icon.together { background: var(--court); }
  .tn-history-icon.me { background: var(--court-light); }
  .tn-history-icon.friend { background: var(--clay); }
  .tn-history-icon.recharge { background: var(--ball); color: var(--ink); }

  .tn-history-body { flex: 1; min-width: 0; }
  .tn-history-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
  }
  .tn-history-sub {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .tn-history-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
  }
  .tn-history-amount.recharge { color: #5C8A2E; }
  .tn-history-del {
    border: none;
    background: none;
    color: var(--ink-soft);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    line-height: 1;
  }
  .tn-history-del:hover { color: var(--clay); background: var(--chalk-dim); }

  .tn-empty {
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    padding: 24px 0;
  }

  /* ---------- Settings panel ---------- */
  .tn-settings-panel {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .tn-settings-panel .tn-field-row:last-child { margin-bottom: 0; }
  .tn-settings-close {
    width: 100%;
    border: 1.5px solid var(--line);
    background: var(--chalk);
    padding: 9px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    margin-top: 4px;
  }

  .tn-loading {
    text-align: center;
    padding: 40px 0;
    color: var(--ink-soft);
    font-size: 13px;
  }
</style>

      const s = await window.storage.get('tn_settings', false);
      if (s) state.settings = JSON.parse(s.value);
    } catch (e) { /* no data yet */ }
    state.loaded = true;
    render();
  }

  async function saveTransactions() {
    try { await window.storage.set('tn_transactions', JSON.stringify(state.transactions), false); }
    catch (e) { console.error('save tx failed', e); }
  }
  async function saveSettings() {
    try { await window.storage.set('tn_settings', JSON.stringify(state.settings), false); }
    catch (e) { console.error('save settings failed', e); }
  }

  function fmtMoney(n) {
    return '¥' + Number(n).toLocaleString('zh-CN', { maximumFractionDigits: 2 });
  }
  function fmtDate(d) {
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getMonth()+1}/${dt.getDate()}`;
  }
  function fmtFullDate(d) {
    const dt = new Date(d + 'T00:00:00');
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }

  function computeSpendingStats() {
    const s = state.settings;
    let totalRecharge = s.initialBalance;
    let totalSpent = 0;
    let myShare = 0;
    let friendShare = 0;
    let playCount = 0;
    let lastPlayDate = null;

    for (const t of state.transactions) {
      if (t.kind === 'recharge') {
        totalRecharge += Number(t.amount);
      } else {
        totalSpent += Number(t.amount);
        playCount++;
        if (t.playType === 'together') {
          myShare += Number(t.amount) / 2;
          friendShare += Number(t.amount) / 2;
        } else if (t.playType === 'me') {
          myShare += Number(t.amount);
        } else if (t.playType === 'friend') {
          friendShare += Number(t.amount);
        }
        if (!lastPlayDate || t.date > lastPlayDate) lastPlayDate = t.date;
      }
    }

    const remaining = totalRecharge - totalSpent;
    const pct = totalRecharge > 0 ? Math.max(0, Math.min(100, (remaining / totalRecharge) * 100)) : 0;

    let daysSinceLast = null;
    if (lastPlayDate) {
      const d1 = new Date(lastPlayDate + 'T00:00:00');
      const d2 = new Date(); d2.setHours(0,0,0,0);
      daysSinceLast = Math.round((d2 - d1) / 86400000);
    }

    return { totalRecharge, totalSpent, remaining, pct, myShare, friendShare, playCount, daysSinceLast };
  }

  // filter: 'month' (this calendar month), 'year' (calendar year given by `year`), 'all'
  function computePlayStats(filter, year) {
    const now = new Date();
    let startDate = null, endDate = null;
    if (filter === 'month') {
      startDate = new Date(now.getFullYear(), now.getMonth(), 1);
    } else if (filter === 'year') {
      const y = year || now.getFullYear();
      startDate = new Date(y, 0, 1);
      endDate = new Date(y + 1, 0, 1);
    }

    let sessionCount = 0, totalHours = 0, totalCost = 0, myHours = 0, friendHours = 0, togetherHours = 0, myCost = 0, friendCost = 0;
    for (const t of state.transactions) {
      if (t.kind !== 'play') continue;
      const d = new Date(t.date + 'T00:00:00');
      if (startDate && d < startDate) continue;
      if (endDate && d >= endDate) continue;
      const hours = Number(t.hours) || 0;
      const amount = Number(t.amount) || 0;
      sessionCount++;
      totalHours += hours;
      totalCost += amount;
      if (t.playType === 'together') {
        togetherHours += hours;
        myHours += hours; friendHours += hours;
        myCost += amount / 2; friendCost += amount / 2;
      } else if (t.playType === 'me') {
        myHours += hours; myCost += amount;
      } else if (t.playType === 'friend') {
        friendHours += hours; friendCost += amount;
      }
    }
    return { sessionCount, totalHours, totalCost, myHours, friendHours, togetherHours, myCost, friendCost };
  }

  function getAvailableYears() {
    const years = new Set();
    years.add(new Date().getFullYear());
    for (const t of state.transactions) {
      if (t.kind === 'play') years.add(new Date(t.date + 'T00:00:00').getFullYear());
    }
    return Array.from(years).sort((a, b) => b - a);
  }

  function fmtHours(n) {
    return Number(n.toFixed(1)).toString();
  }

  function computeMonthlyChart(dimension) {
    // last 6 months, total hours per month for the selected dimension
    const months = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ year: d.getFullYear(), month: d.getMonth(), hours: 0 });
    }
    for (const t of state.transactions) {
      if (t.kind !== 'play') continue;
      const hours = Number(t.hours) || 0;
      let include = false;
      if (dimension === 'together') include = t.playType === 'together';
      else if (dimension === 'friend') include = t.playType === 'friend' || t.playType === 'together';
      else include = t.playType === 'me' || t.playType === 'together'; // default 'me'
      if (!include) continue;
      const d = new Date(t.date + 'T00:00:00');
      for (const m of months) {
        if (d.getFullYear() === m.year && d.getMonth() === m.month) { m.hours += hours; break; }
      }
    }
    return months;
  }

  async function addTransaction() {
    let amount;
    if (state.formMode === 'play') {
      const hours = parseFloat(state.hours);
      if (!hours || hours <= 0) return;
      amount = Math.round(RATES[state.rateType] * hours * 100) / 100;
    } else {
      amount = parseFloat(state.formAmount);
      if (!amount || amount <= 0) return;
    }
    const tx = {
      id: uid(),
      kind: state.formMode,
      date: state.formDate,
      amount: amount,
      note: state.formNote.trim()
    };
    if (state.formMode === 'play') {
      tx.playType = state.playType;
      tx.rateType = state.rateType;
      tx.hours = parseFloat(state.hours);
    }
    state.transactions.push(tx);
    state.formAmount = '';
    state.formNote = '';
    await saveTransactions();
    render();
  }

  async function deleteTransaction(id) {
    state.transactions = state.transactions.filter(t => t.id !== id);
    await saveTransactions();
    render();
  }

  function openSettings() {
    state.settingsDraft = {
      myName: state.settings.myName,
      friendName: state.settings.friendName,
      initialBalance: state.settings.initialBalance
    };
    state.showSettings = true;
    render();
  }

  async function saveSettingsDraft() {
    state.settings.myName = state.settingsDraft.myName.trim() || '我';
    state.settings.friendName = state.settingsDraft.friendName.trim() || '朋友';
    const ib = parseFloat(state.settingsDraft.initialBalance);
    state.settings.initialBalance = isNaN(ib) ? 20000 : ib;
    state.showSettings = false;
    await saveSettings();
    render();
  }

  function render() {
    if (!state.loaded) {
      root.innerHTML = `<div class="tn-loading">加载中...</div>`;
      return;
    }

    const spending = computeSpendingStats();
    const playStats = computePlayStats(state.playFilter, state.summaryYear);
    const years = getAvailableYears();
    const months = computeMonthlyChart(state.chartDimension);
    const maxHours = Math.max(1, ...months.map(m => m.hours));
    const s = state.settings;

    const monthLabel = (m) => `${m.month + 1}月`;
    const filterLabels = { month: '本月', year: `${state.summaryYear}年`, all: '全部' };

    let html = '';

    // Header
    html += `
      <div class="tn-header">
        <h1 class="tn-title">
          <svg class="tn-title-ball" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="15" fill="var(--ball)" stroke="var(--ink)" stroke-width="1"/>
            <path d="M16 1 C 8 7, 8 25, 16 31" fill="none" stroke="var(--ink)" stroke-width="1.5"/>
            <path d="M16 1 C 24 7, 24 25, 16 31" fill="none" stroke="var(--ink)" stroke-width="1.5"/>
          </svg>
          网球<span>记录</span>本
        </h1>
        <button class="tn-settings-btn" id="tn-settings-btn">⚙</button>
      </div>
    `;

    // Settings panel
    if (state.showSettings) {
      html += `
        <div class="tn-settings-panel">
          <div class="tn-field-row">
            <div class="tn-field">
              <label>我的名字</label>
              <input type="text" id="tn-set-myname" value="${escapeHtml(state.settingsDraft.myName)}" />
            </div>
            <div class="tn-field">
              <label>朋友的名字</label>
              <input type="text" id="tn-set-friendname" value="${escapeHtml(state.settingsDraft.friendName)}" />
            </div>
          </div>
          <div class="tn-field-row">
            <div class="tn-field">
              <label>球卡初始金额（元）</label>
              <input type="number" id="tn-set-initbalance" value="${state.settingsDraft.initialBalance}" />
            </div>
          </div>
          <button class="tn-submit-btn" id="tn-settings-save" style="margin-bottom:8px;">保存</button>
          <button class="tn-settings-close" id="tn-settings-cancel">取消</button>
        </div>
      `;
    }

    // ===== Quick add: 记一笔 (moved to top for fast logging) =====
    html += `<div class="tn-quickadd">`;
    html += `<div class="tn-section-title">🎾 记一笔</div>`;
    html += `<div class="tn-form-card">`;
    html += `
      <div class="tn-toggle-row">
        <button class="tn-toggle-btn ${state.formMode === 'play' ? 'active' : ''}" id="tn-mode-play">打球</button>
        <button class="tn-toggle-btn ${state.formMode === 'recharge' ? 'recharge-active' : ''}" id="tn-mode-recharge">充值</button>
      </div>
    `;

    if (state.formMode === 'play') {
      html += `
        <div class="tn-play-type-row">
          <button class="tn-play-type-btn ${state.playType === 'together' ? 'selected' : ''}" data-playtype="together">一起打</button>
          <button class="tn-play-type-btn ${state.playType === 'me' ? 'selected' : ''}" data-playtype="me">${escapeHtml(s.myName)}自己</button>
          <button class="tn-play-type-btn ${state.playType === 'friend' ? 'selected' : ''}" data-playtype="friend">${escapeHtml(s.friendName)}自己</button>
        </div>
        <div class="tn-play-type-row">
          <button class="tn-play-type-btn ${state.rateType === 'off' ? 'selected' : ''}" data-ratetype="off">闲时 ¥${RATES.off}/小时</button>
          <button class="tn-play-type-btn ${state.rateType === 'peak' ? 'selected' : ''}" data-ratetype="peak">忙时 ¥${RATES.peak}/小时</button>
        </div>
      `;
    }

    if (state.formMode === 'play') {
      const computedAmount = Math.round(RATES[state.rateType] * (parseFloat(state.hours) || 0) * 100) / 100;
      html += `
        <div class="tn-field-row">
          <div class="tn-field">
            <label>日期</label>
            <input type="date" id="tn-form-date" value="${state.formDate}" />
          </div>
          <div class="tn-field">
            <label>时长（小时）</label>
            <input type="number" id="tn-form-hours" min="0.5" step="0.5" value="${escapeHtml(String(state.hours))}" />
          </div>
        </div>
        <div class="tn-amount-preview">本次扣费 <strong>${fmtMoney(computedAmount)}</strong></div>
      `;
    } else {
      html += `
        <div class="tn-field-row">
          <div class="tn-field">
            <label>日期</label>
            <input type="date" id="tn-form-date" value="${state.formDate}" />
          </div>
          <div class="tn-field">
            <label>充值金额（元）</label>
            <input type="number" id="tn-form-amount" placeholder="如 1000" value="${escapeHtml(state.formAmount)}" />
          </div>
        </div>
      `;
    }

    html += `
      <div class="tn-field-row">
        <div class="tn-field">
          <label>备注（可选）</label>
          <input type="text" id="tn-form-note" placeholder="如 球场名称" value="${escapeHtml(state.formNote)}" />
        </div>
      </div>
      <button class="tn-submit-btn ${state.formMode === 'recharge' ? 'recharge' : ''}" id="tn-submit">${state.formMode === 'play' ? '记录这场球' : '记录充值'}</button>
    `;
    html += `</div>`;
    html += `</div>`; // close tn-quickadd

    // ===== Section: 球卡余额 =====
    html += `<div class="tn-section-title">球卡余额</div>`;
    html += `
      <div class="tn-scoreboard">
        <div class="tn-score-label">球卡余额</div>
        <div class="tn-score-row">
          <div class="tn-score-main">${fmtMoney(spending.remaining)}</div>
          <div class="tn-score-sub">/ ${fmtMoney(spending.totalRecharge)}</div>
        </div>
        <div class="tn-court-line">
          <div class="tn-court-line-fill" style="width:${spending.pct}%"></div>
          <div class="tn-court-line-ball" style="left:${spending.pct}%"></div>
        </div>
        <div class="tn-score-foot">
          <span>已用 ${fmtMoney(spending.totalSpent)}</span>
          <span>距上次打球 ${spending.daysSinceLast === null ? '—' : spending.daysSinceLast + ' 天'}</span>
        </div>
      </div>
    `;

    // ===== Section: 打球数据（按维度筛选） =====
    html += `<div class="tn-section-title">打球数据</div>`;
    html += `
      <div class="tn-toggle-row" style="margin-bottom:10px;">
        <button class="tn-toggle-btn ${state.playFilter === 'month' ? 'active' : ''}" data-playfilter="month">本月</button>
        <button class="tn-toggle-btn ${state.playFilter === 'year' ? 'active' : ''}" data-playfilter="year">本年</button>
        <button class="tn-toggle-btn ${state.playFilter === 'all' ? 'active' : ''}" data-playfilter="all">全部</button>
      </div>
    `;
    if (state.playFilter === 'year') {
      html += `
        <div style="margin-bottom:10px; display:flex; justify-content:flex-end;">
          <select id="tn-year-select" class="tn-year-select">
            ${years.map(y => `<option value="${y}" ${y === state.summaryYear ? 'selected' : ''}>${y} 年</option>`).join('')}
          </select>
        </div>
      `;
    }
    html += `<div class="tn-stats">`;
    html += statCard(playStats.sessionCount, '场', `${filterLabels[state.playFilter]}总场次`);
    html += statCard(fmtHours(playStats.totalHours), '小时', `${filterLabels[state.playFilter]}总时长`);
    html += statCard(fmtHours(playStats.togetherHours), '小时', `${filterLabels[state.playFilter]}一起打`);
    html += statCard(fmtMoney(playStats.totalCost), '', `${filterLabels[state.playFilter]}总花费`);
    html += statCard(fmtHours(playStats.myHours), '小时', `${escapeHtml(s.myName)}时长`, 'tn-me', AVATAR_TANG);
    html += statCard(fmtMoney(playStats.myCost), '', `${escapeHtml(s.myName)}花费`, 'tn-me', AVATAR_TANG);
    html += statCard(fmtHours(playStats.friendHours), '小时', `${escapeHtml(s.friendName)}时长`, 'tn-friend', AVATAR_KE);
    html += statCard(fmtMoney(playStats.friendCost), '', `${escapeHtml(s.friendName)}花费`, 'tn-friend', AVATAR_KE);
    html += `</div>`;

    html += `<div class="tn-chart-card">`;
    html += `
      <div class="tn-chart-title-row">
        <div class="tn-chart-title">近6个月打球时长（小时）</div>
        <select id="tn-chart-dim-select" class="tn-year-select">
          <option value="me" ${state.chartDimension === 'me' ? 'selected' : ''}>${escapeHtml(s.myName)}</option>
          <option value="friend" ${state.chartDimension === 'friend' ? 'selected' : ''}>${escapeHtml(s.friendName)}</option>
          <option value="together" ${state.chartDimension === 'together' ? 'selected' : ''}>一起打</option>
        </select>
      </div>
    `;
    html += `<div class="tn-chart-bars">`;
    months.forEach((m, i) => {
      const h = (m.hours / maxHours) * 100;
      const isThisMonth = i === months.length - 1;
      html += `
        <div class="tn-bar-col">
          <div class="tn-bar-count">${m.hours > 0 ? fmtHours(m.hours) : ''}</div>
          <div class="tn-bar ${m.hours > 0 ? 'has-games' : ''} ${isThisMonth ? 'this-week' : ''}" style="height:${m.hours > 0 ? Math.max(h, 8) : 4}%"></div>
          <div class="tn-bar-label">${monthLabel(m)}</div>
        </div>
      `;
    });
    html += `</div></div>`;

    // History
    html += `<div class="tn-section-title">记录</div>`;
    if (state.transactions.length === 0) {
      html += `<div class="tn-empty">还没有记录，记一笔开始追踪吧 🎾</div>`;
    } else {
      html += `<div class="tn-history">`;
      const sorted = [...state.transactions].sort((a,b) => b.date.localeCompare(a.date) || 0);
      for (const t of sorted) {
        if (t.kind === 'recharge') {
          html += `
            <div class="tn-history-item">
              <div class="tn-history-icon recharge">+</div>
              <div class="tn-history-body">
                <div class="tn-history-title">球卡充值${t.note ? ' · ' + escapeHtml(t.note) : ''}</div>
                <div class="tn-history-sub">${fmtFullDate(t.date)}</div>
              </div>
              <div class="tn-history-amount recharge">+${fmtMoney(t.amount)}</div>
              <button class="tn-history-del" data-del="${t.id}">×</button>
            </div>
          `;
        } else {
          const label = t.playType === 'together' ? '一起打' : (t.playType === 'me' ? s.myName + '自己打' : s.friendName + '自己打');
          const iconClass = t.playType === 'together' ? 'together' : (t.playType === 'me' ? 'me' : 'friend');
          let iconInner;
          if (t.playType === 'together') {
            iconInner = `<img class="tn-pair-avatar a" src="${AVATAR_KE}" alt="" /><img class="tn-pair-avatar b" src="${AVATAR_TANG}" alt="" />`;
          } else if (t.playType === 'me') {
            iconInner = `<img src="${AVATAR_TANG}" alt="" />`;
          } else {
            iconInner = `<img src="${AVATAR_KE}" alt="" />`;
          }
          html += `
            <div class="tn-history-item">
              <div class="tn-history-icon ${iconClass}">${iconInner}</div>
              <div class="tn-history-body">
                <div class="tn-history-title">${label}${t.note ? ' · ' + escapeHtml(t.note) : ''}</div>
                <div class="tn-history-sub">${fmtFullDate(t.date)}${t.rateType ? ' · ' + RATE_LABELS[t.rateType] + ' ' + t.hours + 'h' : ''}</div>
              </div>
              <div class="tn-history-amount">-${fmtMoney(t.amount)}</div>
              <button class="tn-history-del" data-del="${t.id}">×</button>
            </div>
          `;
        }
      }
      html += `</div>`;
    }

    root.innerHTML = html;
    attachHandlers();
  }

  function statCard(num, unit, label, extraClass, avatar) {
    return `
      <div class="tn-stat-card ${extraClass || ''}">
        ${avatar ? `<img class="tn-stat-avatar" src="${avatar}" alt="" />` : ''}
        <div class="tn-stat-num">${num}${unit ? `<span class="unit">${unit}</span>` : ''}</div>
        <div class="tn-stat-label">${label}</div>
      </div>
    `;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function attachHandlers() {
    const settingsBtn = document.getElementById('tn-settings-btn');
    if (settingsBtn) settingsBtn.onclick = openSettings;

    const setSave = document.getElementById('tn-settings-save');
    if (setSave) setSave.onclick = () => {
      state.settingsDraft.myName = document.getElementById('tn-set-myname').value;
      state.settingsDraft.friendName = document.getElementById('tn-set-friendname').value;
      state.settingsDraft.initialBalance = document.getElementById('tn-set-initbalance').value;
      saveSettingsDraft();
    };
    const setCancel = document.getElementById('tn-settings-cancel');
    if (setCancel) setCancel.onclick = () => { state.showSettings = false; render(); };

    document.querySelectorAll('[data-playfilter]').forEach(btn => {
      btn.onclick = () => {
        syncFormInputs();
        state.playFilter = btn.getAttribute('data-playfilter');
        render();
      };
    });

    const yearSelect = document.getElementById('tn-year-select');
    if (yearSelect) yearSelect.onchange = (e) => {
      syncFormInputs();
      state.summaryYear = parseInt(e.target.value, 10);
      render();
    };

    const chartDimSelect = document.getElementById('tn-chart-dim-select');
    if (chartDimSelect) chartDimSelect.onchange = (e) => {
      syncFormInputs();
      state.chartDimension = e.target.value;
      render();
    };

    const modePlay = document.getElementById('tn-mode-play');
    if (modePlay) modePlay.onclick = () => {
      state.formMode = 'play';
      syncFormInputs();
      render();
    };
    const modeRecharge = document.getElementById('tn-mode-recharge');
    if (modeRecharge) modeRecharge.onclick = () => {
      state.formMode = 'recharge';
      syncFormInputs();
      render();
    };

    document.querySelectorAll('[data-playtype]').forEach(btn => {
      btn.onclick = () => {
        syncFormInputs();
        state.playType = btn.getAttribute('data-playtype');
        render();
      };
    });

    document.querySelectorAll('[data-ratetype]').forEach(btn => {
      btn.onclick = () => {
        syncFormInputs();
        state.rateType = btn.getAttribute('data-ratetype');
        render();
      };
    });

    const submitBtn = document.getElementById('tn-submit');
    if (submitBtn) submitBtn.onclick = () => {
      syncFormInputs();
      addTransaction();
    };

    document.querySelectorAll('[data-del]').forEach(btn => {
      btn.onclick = () => deleteTransaction(btn.getAttribute('data-del'));
    });

    // keep form fields in sync as user types, without full re-render (avoid losing focus)
    const dateInput = document.getElementById('tn-form-date');
    if (dateInput) dateInput.oninput = (e) => { state.formDate = e.target.value; };
    const amountInput = document.getElementById('tn-form-amount');
    if (amountInput) amountInput.oninput = (e) => { state.formAmount = e.target.value; };
    const hoursInput = document.getElementById('tn-form-hours');
    if (hoursInput) hoursInput.oninput = (e) => {
      state.hours = e.target.value;
      const preview = document.querySelector('.tn-amount-preview strong');
      if (preview) {
        const amt = Math.round(RATES[state.rateType] * (parseFloat(state.hours) || 0) * 100) / 100;
        preview.textContent = fmtMoney(amt);
      }
    };
    const noteInput = document.getElementById('tn-form-note');
    if (noteInput) noteInput.oninput = (e) => { state.formNote = e.target.value; };
  }

  function syncFormInputs() {
    const dateInput = document.getElementById('tn-form-date');
    const amountInput = document.getElementById('tn-form-amount');
    const hoursInput = document.getElementById('tn-form-hours');
    const noteInput = document.getElementById('tn-form-note');
    if (dateInput) state.formDate = dateInput.value;
    if (amountInput) state.formAmount = amountInput.value;
    if (hoursInput) state.hours = hoursInput.value;
    if (noteInput) state.formNote = noteInput.value;
  }

  load();
})();
</script>
